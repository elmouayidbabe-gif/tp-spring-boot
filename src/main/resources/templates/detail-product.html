<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Product Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <!-- ❌ إذا المنتج غير موجود -->
    <div th:if="${product == null}" class="alert alert-danger">
        Product not found
    </div>

    <!-- ✅ التفاصيل -->
    <div th:if="${product != null}" class="card">

        <div class="card-header bg-dark text-white">
            Product Details
        </div>

        <div class="card-body">
            <p><strong>ID:</strong> <span th:text="${product.id}"></span></p>
            <p><strong>Name:</strong> <span th:text="${product.name}"></span></p>
            <p><strong>Price:</strong> <span th:text="${product.price}"></span></p>
            <p><strong>Stock:</strong> <span th:text="${product.stock}"></span></p>

            <p><strong>Description:</strong></p>
            <div class="border p-3" th:text="${product.description}"></div>
        </div>

        <!-- 👑 ADMIN فقط -->
        <div class="card-footer" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{'/products/edit/' + ${product.id}}"
               class="btn btn-warning btn-sm">Edit</a>

            <a th:href="@{'/products/delete/' + ${product.id}}"
               class="btn btn-danger btn-sm">Delete</a>
        </div>

    </div>

    <a href="/products" class="btn btn-secondary mt-3">Back</a>

</div>

</body>
</html>
