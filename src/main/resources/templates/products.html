<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Products</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .desc-cell {
            max-width: 260px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">
        <h2>Products List</h2>

        <!-- Add فقط ADMIN -->
        <a sec:authorize="hasRole('ADMIN')"
           th:href="@{/products/add-form}"
           class="btn btn-primary">
            Add Product
        </a>
    </div>

    <table class="table table-bordered table-striped align-middle">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Description</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="p : ${products}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.price}"></td>
            <td th:text="${p.stock}"></td>
            <td class="desc-cell" th:text="${p.description}"></td>

            <td>

                <!-- Details للجميع -->
                <a th:href="@{'/products/detail/' + ${p.id}}"
                   class="btn btn-info btn-sm">
                    Details
                </a>

                <!-- Edit فقط ADMIN -->
                <a sec:authorize="hasRole('ADMIN')"
                   th:href="@{'/products/edit/' + ${p.id}}"
                   class="btn btn-warning btn-sm">
                    Edit
                </a>

                <!-- Delete فقط ADMIN -->
                <a sec:authorize="hasRole('ADMIN')"
                   th:href="@{'/products/delete/' + ${p.id}}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this product?');">
                    Delete
                </a>

             <a th:href="@{'/products/buy-form/' + ${p.id}}" class="btn btn-success btn-sm">
             Buy </a>

            </td>
        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
