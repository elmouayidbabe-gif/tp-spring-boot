<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Article Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2 th:text="${article.title}"></h2>

<hr>

<p th:text="${article.content}"></p>

<hr>

<h4>Comments</h4>

<ul class="list-group mb-3">

  <li class="list-group-item"
      th:each="comment : ${comments}">

    <b th:text="${comment.username}"></b> :
    <span th:text="${comment.text}"></span>

    <!-- DELETE BUTTON (USER + ADMIN RULE) -->
    <a th:if="${#authorization.expression('hasRole(''ADMIN'')')
                   or comment.username == #authentication.name}"
       th:href="@{/articles/{articleId}/comments/delete/{id}
           (articleId=${article.id}, id=${comment.id})}"
       class="btn btn-danger btn-sm float-end">
      Delete
    </a>

  </li>

</ul>

<form th:action="@{/articles/{id}/comments(id=${article.id})}"
      method="post">

    <textarea name="content"
              class="form-control mb-2"
              placeholder="Write a comment..."
              required></textarea>

  <button class="btn btn-primary">Add Comment</button>

</form>

<br>

<a href="/articles" class="btn btn-secondary">
  Back to Articles
</a>

</body>
</html>
